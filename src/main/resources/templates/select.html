<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('TripToN - 가방 선택', '/css/select.css')}"></th:block>
    <script src="/js/select.js" defer></script>
</head>
<body>

    <th:block th:replace="~{fragments/layout :: app-chrome}"></th:block>

    <!-- 중앙에 보여질 가방 이미지 -->
    <div class="bag-container">
        <img id="bag-image" src="/image/select/item1.png" alt="Bag">
    </div>

    <!-- 아이템 소개 모달 -->
    <div class="item-modal" id="itemModal">
        <div class="modal-background" onclick="closeItemModal()"></div>
        <div class="modal-content">
            <img id="item-story-image" src="" alt="Item Story">

            <!-- 버튼 컨테이너 -->
            <div class="modal-buttons">
                <!-- 화살표 버튼 (입력창 열기용) -->
                <div class="modal-arrow-btn" onclick="showInputModal()">
                    <img src="/image/select/arrow22.png" alt="선택하기">
                </div>

                <!-- 닫기 버튼 -->
                <div class="modal-close-btn" onclick="closeItemModal()">
                    <img src="/image/select/CLOSE.png" alt="닫기">
                </div>
            </div>
        </div>
    </div>

    <!-- 사용자 입력 모달 -->
    <div class="input-modal" id="inputModal">
        <div class="input-modal-background"></div>

        <!-- 모달 외부 상단 헤더 텍스트 -->
        <div class="input-modal-title">
            <h2>당신의 배게는</h2>
            <p>너무 많은 걱정을 품고있지 않나요?</p>
        </div>

        <div class="input-modal-content">
            <!-- 모달 컨테이너 상단 이미지 -->
            <div class="input-modal-inner-image">
                <img src="/image/select/enterYourThoughts.png" alt="당신의 생각을 입력해보세요">
            </div>
            <div class="input-modal-body">
                <form id="concern-form" method="post" action="/concern">
                    <input type="hidden" id="luggage-input" name="luggageType" value="">
                    <div class="input-container">
                        <input type="text" id="title-input" name="concernTitle" placeholder="고민 제목을 입력해주세요" maxlength="50">
                    </div>
                    <div class="input-container">
                        <textarea id="concern-input" name="concernContent" placeholder="EX) 내일 그 일 어떻게 하지..." rows="6" maxlength="120"></textarea>
                    </div>

                    <div class="input-modal-buttons">
                        <!-- 제출 화살표 버튼 -->
                        <div class="input-modal-arrow-btn" onclick="submitConcern()">
                            <img src="/image/select/arrow22.png" alt="제출하기">
                        </div>

                        <!-- 닫기 버튼 -->
                        <div class="input-modal-close-btn" onclick="closeInputModal()">
                            <img src="/image/select/CLOSE.png" alt="닫기">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 하단 컨트롤 영역 -->
    <div class="bottom-controls">
        <div class="arrow-btn" id="prev-btn">
            <img src="/image/select/arrow11.png" alt="Previous">
        </div>

        <div class="about-btn" id="about-btn" onclick="openItemModal()">
            <img src="/image/select/ABOUT.png" alt="About">
        </div>

        <div class="arrow-btn" id="next-btn">
            <img src="/image/select/arrow22.png" alt="Next">
        </div>
    </div>

    <div class="moving-text">
        <img src="/image/select/BackgroundText.png" alt="Moving Text">
    </div>

    <div class="waiting-overlay" id="waitingOverlay" aria-live="polite" aria-hidden="true">
        <div class="waiting-content waiting-measure-stage" id="waitingMeasureStage">
            <img class="waiting-decoration waiting-decoration-1" src="/image/waiting/장식_left.png" alt="">
            <img class="waiting-title-image" src="/image/waiting/당신의 생각 무게 측정중.png" alt="당신의 생각 무게 측정중">
            <img class="waiting-decoration waiting-decoration-2" src="/image/waiting/장식_right.png" alt="">
            <img class="waiting-arrow-image waiting-measure-arrow" src="/image/main/arrow.png" alt="">
        </div>
        <div class="weight-content" id="weightContent" aria-hidden="true">
            <img class="weight-title-image" src="/image/weight/당신의 생각 무게는_.png" alt="당신의 생각 무게는">
            <img class="weight-line-image" src="/image/weight/Line%201.png" alt="">
            <img class="blackhole-image" src="/image/weight/블랙홀.gif" alt="블랙홀">
            <img class="blackhole-weight-image" src="/image/weight/블랙홀 무게.png" alt="블랙홀 무게">
            <img class="waiting-arrow-image weight-arrow-image" src="/image/main/arrow.png" alt="">
        </div>
    </div>

    <th:block th:replace="~{fragments/common-scripts :: music-scripts}"></th:block>

</body>
</html>
